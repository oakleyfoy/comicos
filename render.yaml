# Render Blueprint — static frontend (comicosapp.com).
# SPA client routes require a catch-all rewrite to index.html.
services:
  - type: web
    name: comic-os-web
    runtime: static
    rootDir: apps/web
    buildCommand: npm install && npm run build
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# P86 Release Lifecycle — Render Cron is NOT defined here (static site only).
# Create manually in Render Dashboard or apply docs/render/P86_RENDER_CRON_BLUEPRINT.yaml
# in a separate backend blueprint. See docs/P86_RELEASE_LIFECYCLE_AUTOMATION.md.
